<html>
<head><meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
        <div id="sex-chart" class="plotly-graph-div" style="height:350px; width:100%;"></div>
        <script type="text/javascript">
            Plotly.newPlot("sex-chart", [
                {
                    name: "Moderate",
                    type: "bar",
                    orientation: "h",
                    y: ["Male", "Female"],
                    x: [17.1, 22.1],
                    text: ["17.1%", "22.1%"],
                    textposition: "outside",
                    marker: { color: "#2b6cb0" },
                    textfont: { size: 12 },
                    hovertemplate: "<b>%{y}</b><br>Moderate: %{x:,.1f}%<extra></extra>"
                },
                {
                    name: "Aggressive",
                    type: "bar",
                    orientation: "h",
                    y: ["Male", "Female"],
                    x: [29.5, 35.4],
                    text: ["29.5%", "35.4%"],
                    textposition: "outside",
                    marker: { color: "#90cdf4" },
                    textfont: { size: 12 },
                    hovertemplate: "<b>%{y}</b><br>Aggressive: %{x:,.1f}%<extra></extra>"
                }
            ], {
                barmode: "group",
                font: { family: "Raleway, sans-serif", color: "#2a3f5f" },
                title: { text: "Mean AI Exposure by Gender", font: { size: 16 } },
                xaxis: { title: { text: "Mean AI Exposure (%)", font: { size: 13 } }, range: [0, 45], gridcolor: "#EBF0F8" },
                yaxis: { automargin: true },
                legend: { orientation: "h", y: 1.15, x: 0.5, xanchor: "center" },
                margin: { l: 80, r: 60, t: 70, b: 60 },
                hoverlabel: { bgcolor: "rgba(255,255,255,0.85)", bordercolor: "#2b6cb0", font: { family: "Raleway, sans-serif", size: 12 } },
                paper_bgcolor: "white",
                plot_bgcolor: "white",
                height: 350,
                separators: ".,",
                annotations: [{
                    x: 22.1, y: "Female",
                    ax: 60, ay: -30,
                    text: "29% gender gap persists<br>across both scenarios",
                    showarrow: true,
                    arrowhead: 2,
                    arrowcolor: "#2b6cb0",
                    font: { size: 10, color: "#2b6cb0" },
                    bgcolor: "rgba(235,244,255,0.9)",
                    bordercolor: "#2b6cb0",
                    borderwidth: 1
                }]
            }, { responsive: true });
        </script>
    </div>
</body>
</html>
